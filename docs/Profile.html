    <script>
        const CART_KEY = 'tabeyaCart';
        const USER_KEY = 'currentUser';
        const LOGIN_PAGE = 'Login.html';
        const CATER_RESERVATION_PAGE = 'CaterReservation.html';
        const PROFILE_PAGE = 'Profile.html';

        let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];

        // --- Core Login Check ---
        function checkUserLoginStatus() {
            return localStorage.getItem(USER_KEY) !== null;
        }

        function checkLoginAndProceed(redirectTarget) {
            if (!checkUserLoginStatus()) {
                alert("You must log in to perform this action.");
                if (redirectTarget) {
                    localStorage.setItem('redirectAfterLogin', redirectTarget);
                }
                window.location.href = LOGIN_PAGE;
                return false;
            }
            if (redirectTarget && redirectTarget !== 'Profile.html') {
                window.location.href = redirectTarget;
            }
            return true;
        }

        // --- Fetch Total Orders + Reservations from Server ---
        async function fetchUserTotalOrders(customerId) {
            try {
                // Add timestamp to prevent caching
                const timestamp = new Date().getTime();
                const response = await fetch(`get_user_orders_count.php?customer_id=${customerId}&_=${timestamp}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const result = await response.json();

                if (result.success) {
                    // Return the full result object with breakdown
                    return {
                        total: result.total_orders || 0,
                        orders: result.orders_count || 0,
                        reservations: result.reservations_count || 0
                    };
                } else {
                    console.error('Error fetching orders:', result.message);
                    return { total: 0, orders: 0, reservations: 0 };
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                return { total: 0, orders: 0, reservations: 0 };
            }
        }

        // --- Profile Logic ---
        async function renderProfileDetails(user) {
            document.getElementById('profile-name').textContent = user.name || 'N/A';
            document.getElementById('profile-email').textContent = user.email || 'N/A';
            const contactNumber = user.contactNumber || user.contact || user.contactNo || 'N/A';
            document.getElementById('profile-contact').textContent = contactNumber;

            // Fetch actual total orders + reservations from server
            const customerId = user.customerId || user.CustomerID || user.id || user.userId;
            const orderCountEl = document.getElementById('profile-orders-count');
            
            if (customerId && orderCountEl) {
                const orderStats = await fetchUserTotalOrders(customerId);
                orderCountEl.textContent = orderStats.total;
            } else if (orderCountEl) {
                orderCountEl.textContent = '0';
            }
        }

        function checkAndLoadProfile() {
            const user = JSON.parse(localStorage.getItem(USER_KEY));

            if (!user) {
                // Redirect user if not logged in
                alert("You need to log in to view your profile.");
                window.location.href = LOGIN_PAGE;
            } else {
                renderProfileDetails(user);
            }
        }

        // --- Logout Function ---
        async function logoutUser() {
            try {
                // Call server logout to destroy session
                const apiUrl = window.location.origin + window.location.pathname.replace('Profile.html', '') + 'api/auth/authentication.php?action=logout';
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include'
                });

                // Even if server logout fails, proceed with client-side cleanup
                if (response.ok) {
                    const result = await response.json();
                    console.log('Server logout:', result.message);
                } else {
                    console.warn('Server logout failed, but proceeding with client logout');
                }
            } catch (error) {
                console.warn('Error calling server logout:', error);
            }

            // Remove all user-related data
            localStorage.removeItem(USER_KEY);
            localStorage.removeItem('userTotalOrders');
            localStorage.removeItem(CART_KEY); // Clear cart

            alert("You have been logged out.");
            window.location.href = LOGIN_PAGE; // Redirect
        }

        // --- Cart Display Logic ---
        function updateCartDisplay() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-item-count').textContent = count;
        }

        function updateAccountLink() {
            const accountLink = document.getElementById('account-link');
            const user = JSON.parse(localStorage.getItem(USER_KEY));

            if (user) {
                accountLink.textContent = user.name.split(' ')[0].toUpperCase();
                accountLink.href = PROFILE_PAGE;
                accountLink.classList.add('active');
            } else {
                accountLink.textContent = 'PROFILE';
                accountLink.href = LOGIN_PAGE;
                accountLink.classList.add('active');
            }
        }

        function setupGlobalListeners() {
            const caterLink = document.getElementById('cater-reservation-link');
            if (caterLink) {
                caterLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    checkLoginAndProceed(CATER_RESERVATION_PAGE);
                });
            }

            // Logout Button Listener
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', logoutUser);
            }
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            checkAndLoadProfile();
            updateCartDisplay();
            updateAccountLink();
            setupGlobalListeners();
        });
    </script>
